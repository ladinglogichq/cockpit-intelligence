openapi: 3.0.3
info:
  title: DPA API Documentation
  version: 1.0.0
  description: "\n### Generate API keys\n\nVisit <a href=\"https://digitalpolicyalert.org/account/api-keys\"\
    \ target=\"_blank\" rel=\"noopener noreferrer\">https://digitalpolicyalert.org/account/api-keys</a>\
    \ to generate a new API key.\n\t"
paths:
  /api/v1/dpa/events/:
    post:
      operationId: Querying of events
      description: "\nThis endpoint allows querying of DPA events with various filters\
        \ and parameters.\n\n### Access\nThis endpoint can be accessed via the following\
        \ request:\n\n```bash\ncurl -X POST https://api.globaltradealert.org/api/v1/dpa/events/\
        \ \\\n-H 'Content-Type: application/json' \\\n-H 'Authorization: APIKey [YOUR_API_KEY]'\
        \ \\\n-d '{[YOUR_REQUEST_BODY]}'\n```\n\n### Access Levels\n- **Public tier**\
        \ (`dpa-data`): Returns base event fields\n- **Full tier** (`dpa-data-full`):\
        \ Additionally includes `sources` array with source details (name, url, institution_name,\
        \ source_type)\n\n### Response Format\nThe response is a plain JSON array.\n\
        \n### Keyword Search\nThe `query` parameter supports boolean keyword search\
        \ with the following operators:\n- `|` — OR operator (e.g. `\"AI | algorithm\"\
        ` matches events containing either term)\n- `&` — AND operator (e.g. `\"data\
        \ & privacy\"` matches events containing both terms)\n- `()` — Grouping (e.g.\
        \ `\"(AI | algorithm) & regulation\"`)\n- `#` — Wildcard character\n\nKeywords\
        \ are matched case-insensitively across event title, event description, intervention\
        \ title, implementer name, and implementer group name. When no operator is\
        \ provided, a simple contains search is performed.\n\n### Pagination\nUse\
        \ the `limit` and `offset` parameters to paginate through the output. The\
        \ maximum `limit` is 1000 entries per request. To paginate, increment `offset`\
        \ by `limit` on each subsequent request.\n\nI.e. to get the first 1000 entries,\
        \ set the `limit` to 1000 and the `offset` to 0. To get the next 1000 entries,\
        \ set the `limit` to 1000 and the `offset` to 1000, and so forth.\n\nAn empty\
        \ array is returned if the offset is higher than the total number of entries\
        \ matching the request filters.\n\t\t\t"
      tags:
      - DPA Data
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventsRequestBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventsRequestBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventsRequestBody'
        required: true
      security:
      - APIKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventFullListPublicAPI'
              examples:
                PublicAccessExample(dpa-data):
                  value:
                  - id: 20442
                    title: Adopted Second Edition Model AI Governance Framework
                    url: https://digitalpolicyalert.org/event/20442-adopted-model-ai-governance-framework-for-generative-ai
                    description: On 21 January 2020, the Infocomm Media Development
                      Authority (IMDA) of Singapore, together with the Personal Data
                      Privacy Commission (PDPC) and in collaboration with the World
                      Economic Forum (WEF), adopted the Second Edition Model AI Governance
                      Framework. The Governance Framework updates the First Edition
                      Model AI Governance Framework, adopted in 2019, [...]
                    date: '2020-01-21'
                    status: adopted
                    event_type: outline
                    action_type: adoption
                    implementers:
                    - name: Singapore
                      id: 702
                    implementer_groups: []
                    threads:
                    - id: 12
                      name: AI Governance
                      slug: ai-governance
                    policy_area: Design and testing standards
                    policy_instrument: Artificial Intelligence authority governance
                    economic_activities:
                    - name: ML and AI development
                      id: 9
                    implementation_level: national
                    publication_date: '2020-01-22'
                    intervention_id: 1234
                    intervention_title: Model AI Governance Framework
                    intervention_url: https://digitalpolicyalert.org/change/1234-model-ai-governance-framework
                  summary: Public Access Example (dpa-data)
                FullAccessExample(dpa-data-full):
                  value:
                  - id: 20442
                    title: Adopted Second Edition Model AI Governance Framework
                    url: https://digitalpolicyalert.org/event/20442-adopted-model-ai-governance-framework-for-generative-ai
                    description: On 21 January 2020, the Infocomm Media Development
                      Authority (IMDA) of Singapore, together with the Personal Data
                      Privacy Commission (PDPC) and in collaboration with the World
                      Economic Forum (WEF), adopted the Second Edition Model AI Governance
                      Framework. The Governance Framework updates the First Edition
                      Model AI Governance Framework, adopted in 2019, [...]
                    date: '2020-01-21'
                    status: adopted
                    event_type: outline
                    action_type: adoption
                    implementers:
                    - name: Singapore
                      id: 702
                    implementer_groups: []
                    threads:
                    - id: 12
                      name: AI Governance
                      slug: ai-governance
                    policy_area: Design and testing standards
                    policy_instrument: Artificial Intelligence authority governance
                    economic_activities:
                    - name: ML and AI development
                      id: 9
                    implementation_level: national
                    publication_date: '2020-01-22'
                    intervention_id: 1234
                    intervention_title: Model AI Governance Framework
                    intervention_url: https://digitalpolicyalert.org/change/1234-model-ai-governance-framework
                    sources:
                    - name: IMDA Model AI Governance Framework
                      url: https://www.imda.gov.sg/resources/press-releases-factsheets-and-speeches/press-releases/2020/singapore-releases-model-ai-governance-framework-second-edition
                      institution_name: IMDA Singapore
                      source_type: Government
                  summary: Full Access Example (dpa-data-full)
          description: Success
        '400':
          description: Bad Request
  /api/v1/dpa/mappings/:
    post:
      operationId: Querying of DPA mapping helpers
      description: "\nThis endpoint allows querying of DPA mapping helpers.\n\n###\
        \ Access\nThis endpoint can be accessed via the following request:\n\n```bash\n\
        curl -X POST https://api.globaltradealert.org/api/v1/dpa/mappings/ \\\n-H\
        \ 'Content-Type: application/json' \\\n-H 'Authorization: APIKey [YOUR_API_KEY]'\
        \ \\\n-d '{[YOUR_REQUEST_BODY]}'\n```\n\t\t\t"
      tags:
      - DPA Mapping Helpers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DPAMappingRequestBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DPAMappingRequestBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DPAMappingRequestBody'
        required: true
      security:
      - APIKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DPAMappingResponse'
              examples:
                FullAccessExample:
                  value:
                    economic_activities:
                    - id: 1
                      slug: cross-cutting
                      name: cross-cutting
                    - '...'
                    - id: 22
                      slug: infrastructure-provider-other
                      name: 'infrastructure provider: other'
                    policy_areas:
                    - id: 1
                      name: International trade
                      name_short: International trade
                    - '...'
                    - id: 17
                      name: Regulatory Compliance and Transparency
                      name_short: Regulatory Compliance and Transparency
                    threads:
                    - id: 12
                      name: AI Governance
                      slug: ai-governance
                    - '...'
                    - id: 34
                      name: Data Privacy
                      slug: data-privacy
                  summary: Full Access Example
          description: Success. Returns an object keyed by the requested mapping type,
            where each value is an array of objects.
        '400':
          description: Bad Request
components:
  schemas:
    DPAMappingRequestBody:
      type: object
      description: Serializer for DPA mapping request body
      properties:
        keys:
          type: array
          items:
            type: string
          example:
          - economic_activities
          - policy_areas
          - threads
          description: Define the parameters you would like to get the mappings to
            output to, choices are `jurisdictions`, `economic_activities`, `government_branches`,
            `event_types`, `policy_areas`, `implementation_levels`, `threads`.
      required:
      - keys
    DPAMappingResponse:
      type: object
      properties:
        mapping_key:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: Each requested key maps to an array of objects. Object fields
            vary by mapping type (e.g. id/slug/name for economic_activities, id/name/name_short
            for policy_areas).
      required:
      - mapping_key
    EventFullListPublicAPI:
      type: object
      description: Full tier serializer for events API (access level 5) - includes
        sources
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        url:
          type: string
        description:
          type: string
        date:
          type: string
          format: date
        status:
          type: string
        event_type:
          type: string
        action_type:
          type: string
        implementers:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        implementer_groups:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        threads:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        policy_area:
          type: string
        policy_instrument:
          type: string
        economic_activities:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        implementation_level:
          type: string
        publication_date:
          type: string
          format: date-time
        intervention_id:
          type: integer
        intervention_title:
          type: string
        intervention_url:
          type: string
          format: uri
        sources:
          type: array
          items:
            $ref: '#/components/schemas/EventSourcePublicAPI'
          readOnly: true
      required:
      - action_type
      - date
      - description
      - economic_activities
      - event_type
      - id
      - implementation_level
      - implementer_groups
      - implementers
      - intervention_id
      - intervention_title
      - intervention_url
      - policy_area
      - policy_instrument
      - publication_date
      - sources
      - status
      - threads
      - title
      - url
    EventSourcePublicAPI:
      type: object
      description: Serializer for event sources
      properties:
        name:
          type: string
          maxLength: 300
        url:
          type: string
          nullable: true
          maxLength: 1000
        institution_name:
          type: string
          nullable: true
          maxLength: 250
        source_type:
          type: string
          nullable: true
      required:
      - name
      - source_type
    EventsRequestBody:
      type: object
      description: Reusable serializer for events API request body
      properties:
        limit:
          type: integer
          default: 10
          description: Set the size of the result set here. Accepted is any number
            between 0 and 1000.
        offset:
          type: integer
          default: 0
          description: Use this parameter to paginate through the output, it accepts
            any number.
        sorting:
          type: array
          items:
            type: string
          default:
          - -date
          - -id
          description: 'Define the parameters you would like to sort the output by.
            Valid sort keys: `id`, `date`, `status`, `event_type`, `action_type`,
            `publication_date`. Reverse the order by adding a `-` in front of the
            sort key, e.g. `-date`. Multiple sort keys can be provided as separate
            list items, e.g. `["-date", "id"]`.'
        show_keys:
          type: array
          items:
            type: string
          default: []
          description: List of keys to show in the output. If not provided, all keys
            will be shown.
        request_data:
          allOf:
          - $ref: '#/components/schemas/EventsRequestDataFilters'
          description: This parameter accepts an object containing the key-value pairs
            used as filters.
      required:
      - request_data
    EventsRequestDataFilters:
      type: object
      description: |-
        Serializer for events request data filters

        To customize which choice fields to include, override selected_fields:
            class CustomSerializer(EventsRequestDataFiltersSerializer):
                selected_fields = ['implementing_jurisdiction', 'economic_activity']

        By default, includes all DPA choice fields.
      properties:
        implementation_level:
          type: array
          items:
            enum:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            type: integer
            description: |-
              * `1` - national
              * `2` - supranational
              * `3` - subnational
              * `4` - bi- or plurilateral agreement
              * `5` - multilateral agreement
              * `6` - other
            x-spec-enum-id: 4587f584a94a52b0
          description: <details><summary>Filters by implementation levels. Accepted
            is a list of implementation level codes.</summary><code>1</code> - national<br><code>2</code>
            - supranational<br><code>3</code> - subnational<br><code>4</code> - bi-
            or plurilateral agreement<br><code>5</code> - multilateral agreement<br><code>6</code>
            - other<br></details>
        event_period:
          type: array
          items:
            type: string
            format: date
          example:
          - '2020-01-01'
          - '2024-12-31'
          description: Daterange filter defining in which range the event date occurs.
        publication_date:
          type: array
          items:
            type: string
            format: date
          example:
          - '2020-01-01'
          - '2024-12-31'
          description: Daterange filter defining in which range the publication date
            (date when event was first published) occurs.
        query:
          type: string
          description: 'Boolean keyword search across event title, event description,
            intervention title, implementer name, and implementer group name. Supports
            operators: `|` (OR), `&` (AND), and parentheses `()` for grouping. Use
            `#` as a wildcard character. Case-insensitive. Minimum 2 characters. Examples:
            `"privacy"`, `"AI | algorithm"`, `"data & privacy"`, `"(AI | algorithm)
            & regulation"`.'
          maxLength: 500
        threads:
          type: array
          items:
            type: integer
          example:
          - 12
          - 34
          description: Filter events by thread IDs. Only events linked to interventions
            that belong to the specified threads will be returned.
        event_id:
          type: array
          items:
            type: integer
          example:
          - 20442
          - 20443
          description: Filter events by a list of event IDs. Only events whose `id`
            is in the provided list will be returned. Can be combined with other filters
            (AND semantics).
        implementing_jurisdiction:
          type: array
